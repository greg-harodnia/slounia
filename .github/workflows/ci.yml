name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: PUBLIC_SUPABASE_URL=x PUBLIC_SUPABASE_ANON_KEY=x bun run check
      - run: bun run test
      - run: bun run lint
