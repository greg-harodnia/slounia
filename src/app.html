<!doctype html>
<html lang="be" data-theme>
	<head>
		<meta charset="utf-8" />
		<meta name="theme-color" content="#f5f7fa" />
		<script>
			(function() {
				var theme = localStorage.getItem('theme');
				if (theme === 'national' && window.innerWidth <= 1024) {
					theme = null;
				}
				if (theme !== 'light' && theme !== 'dark' && theme !== 'national') {
					theme = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
				}
				document.documentElement.dataset.theme = theme;
				var meta = document.querySelector('meta[name="theme-color"]');
				if (meta) {
					if (theme === 'dark') meta.content = '#0f172a';
					else if (theme === 'national') meta.content = '#c1382e';
					else meta.content = '#f5f7fa';
				}
			})();
		</script>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<title>Слоўня</title>
		<meta name="description" content="Слоўня — слоўнік жывой мовы. Пошук і прагляд слоў зь перакладамі калек (наркамаўка) на чыстую мову (тарашкевіца). Антыкалька." />
		<meta name="google-site-verification" content="iq8jWEBBgOGphhe_DsZrJooW6snKoLPYG3X5yKfvgRs" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
